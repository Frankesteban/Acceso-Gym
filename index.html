<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Validación y Control - Vida Fit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap');
        :root {
            --bg-default: #121214;
            --bg-verde: #2ec4b6;
            --bg-rojo: #e63946;
            --text-light: #ffffff;
            --branding-orange: #ff8c00;
            --card-bg: rgba(28, 28, 30, 0.95);
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-default); color: var(--text-light);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; transition: background-color 0.4s ease; overflow-x: hidden;
            position: relative;
        }
        
        /* 1. VISTA PRINCIPAL (CENTRADA Y LIMPIA) */
        .contenedor {
            text-align: center; width: 90%; max-width: 550px; padding: 35px 25px;
            border-radius: 15px; background: rgba(0, 0, 0, 0.75);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1;
        }
        h1 { font-family: 'Bebas Neue', cursive; font-size: 2.8rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; color: #fff; }
        .subtitulo { font-size: 1rem; color: #aaa; margin-bottom: 25px; }
        
        #documentoInput {
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 10px;
            color: white; font-size: 2.2rem; padding: 12px; text-align: center; width: 85%;
            outline: none; margin-bottom: 10px; font-family: 'Bebas Neue', monospace; letter-spacing: 3px;
            transition: all 0.3s ease;
        }
        #documentoInput:focus {
            border-color: var(--branding-orange);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
            background: rgba(0, 0, 0, 0.4);
        }
        
        .pantalla-aviso { margin-top: 15px; padding: 15px; border-radius: 10px; font-size: 1.5rem; font-weight: bold; display: none; }
        .nombre-usuario { font-size: 1.8rem; margin-top: 5px; display: block; color: #fff; }

        /* SECCIÓN DE ACCIONES CONTEXTUALES (PAGOS Y EDICIÓN) DENTRO DE LA TARJETA */
        .seccion-accion {
            margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.05);
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); text-align: left;
        }
        .seccion-accion label { display: block; font-size: 0.85rem; color: #bbb; margin-bottom: 5px; }
        .seccion-accion input, .seccion-accion select {
            width: 100%; padding: 8px 12px; box-sizing: border-box; background: #2c2c2e;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 0.95rem; outline: none; margin-bottom: 12px;
        }

        /* BOTONES SUPERIORES (ADMIN Y REPORTES) */
        .top-nav { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 10; }
        .btn-nav {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 10px 15px; border-radius: 6px; cursor: pointer;
            font-size: 0.85rem; font-weight: bold; transition: 0.3s;
        }
        .btn-nav:hover { background: var(--branding-orange); border-color: var(--branding-orange); }

        /* VENTANAS MODALES (ADMINISTRACIÓN Y REPORTES) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s ease; z-index: 100;
        }
        .modal.visible { opacity: 1; pointer-events: auto; }
        .modal-contenido {
            background: #1c1c1e; padding: 30px; border-radius: 12px;
            width: 90%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); max-height: 90vh; overflow-y: auto;
        }
        .modal-contenido.ancho-especial { max-width: 850px; }
        .modal-contenido h2 { font-family: 'Bebas Neue', cursive; font-size: 2rem; margin-top: 0; color: var(--branding-orange); letter-spacing: 1px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; box-sizing: border-box; background: #2c2c2e;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 1rem; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--branding-orange); }
        
        .btn-block { width: 100%; padding: 12px; background: var(--branding-orange); border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-block:hover { background: #e07b00; }
        .btn-success { background: #2ec4b6; color: #121214; }
        .btn-success:hover { background: #26a99d; }
        .btn-cerrar { background: transparent; border: none; color: #aaa; cursor: pointer; float: right; font-size: 1.3rem; }
        .btn-cerrar:hover { color: white; }

        /* TABLA DE REPORTES */
        .tabla-contenedor { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: var(--branding-orange); font-weight: bold; }

        /* NOTIFICACIÓN TOAST */
        .toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-40px);
            background: #2c2c2e; padding: 15px 25px; border-radius: 8px; font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center;
            gap: 10px; opacity: 0; transition: transform 0.4s ease, opacity 0.3s ease;
            border-left: 5px solid transparent; pointer-events: none;
        }
        .toast-container.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-success { border-left-color: var(--bg-verde); color: white; }
        .toast-error { border-left-color: var(--bg-rojo); color: white; }
        .d-none { display: none !important; }
    </style>
</head>
<body>

    <!-- BOTONES DE NAVEGACIÓN SUPERIOR -->
    <div class="top-nav">
        <button class="btn-nav d-none" id="btnReportesNav" onclick="abrirReportes()">📊 Reportes y Cierre</button>
        <button class="btn-nav" id="btnAdmin" onclick="abrirAdmin()">⚙️ Gestión Socios</button>
    </div>

    <!-- 1. MÓDULO PRINCIPAL DE CONSULTA (LO ÚNICO VISIBLE AL INICIO) -->
    <div class="contenedor" id="tarjeta">
        <img src="https://acceso-gym.vercel.app/logo-vidafit.png" alt="Logo Cliente" style="max-width: 200px; margin-bottom: 15px; display: inline-block;">
        <h1 id="mainTitulo">Cargando...</h1>
        <p class="subtitulo" id="mainSubtitulo">Por favor espere...</p>
        
        <input type="text" id="documentoInput" autocomplete="off" placeholder="00000000" autofocus />

        <!-- AVISO DE RESULTADO DE CONSULTA -->
        <div id="aviso" class="pantalla-aviso"></div>

        <!-- TARJETA CONTEXTUAL (SE MUESTRA SOLO AL CONSULTAR SOCIO) -->
        <div id="seccionSocioConsultado" class="d-none">
            
            <!-- OPCIÓN DE EDICIÓN DE DATOS (SOLO ADMIN) -->
            <div id="containerEdicionAdmin" class="seccion-accion d-none">
                <input type="hidden" id="txt-id-socio">
                <input type="hidden" id="txt-documento-socio">
                <div class="form-group mb-2">
                    <label>Nombre Completo:</label>
                    <input type="text" id="txt-nombre-socio" readonly>
                </div>
                <div class="form-group mb-2">
                    <label>Teléfono:</label>
                    <input type="text" id="txt-telefono-socio" readonly>
                </div>
                <button id="btn-editar-socio" class="btn-nav" style="width:100%" onclick="habilitarEdicion()">✏️ Editar Datos del Socio</button>
                <button id="btn-guardar-socio" class="btn-block btn-success d-none" onclick="guardarEdicionSocio()">💾 Guardar Cambios</button>
            </div>

            <!-- MÓDULO DE RENOVACIÓN / PAGO (VISIBLE CUANDO ESTÁ VENCIDO O SE REQUIERE COBRO) -->
            <div id="seccion-renovacion" class="seccion-accion d-none">
                <h4 style="margin:0 0 10px 0; color:var(--branding-orange);">💳 Registrar Pago / Renovación</h4>
                
                <label for="select-meses">Cantidad de Meses:</label>
                <select id="select-meses" onchange="calcularMontoRenovacion()">
                    <option value="1">1 Mes</option>
                    <option value="2">2 Meses</option>
                    <option value="3">3 Meses</option>
                    <option value="6">6 Meses</option>
                    <option value="12">1 Año</option>
                </select>

                <label for="select-metodo">Método de Pago:</label>
                <select id="select-metodo">
                    <option value="EFECTIVO">Efectivo</option>
                    <option value="NEQUI">Nequi</option>
                    <option value="DAVIPLATA">Daviplata</option>
                    <option value="TARJETA">Tarjeta</option>
                </select>

                <div style="font-size:1.1rem; font-weight:bold; color:var(--bg-verde); margin: 10px 0;">
                    Total a cobrar: $<span id="lbl-monto-total">60.000</span>
                </div>

                <button class="btn-block btn-success" onclick="procesarRenovacion()">Confirmar Pago</button>
            </div>

        </div>
    </div>

    <!-- 2. MODAL DE GESTIÓN Y REGISTRO (PANEL DE CONTROL) -->
    <div id="modalAdmin" class="modal">
        <div class="modal-contenido">
            <button class="btn-cerrar" onclick="cerrarAdmin()">✕</button>
            <h2 id="modalTitulo">Gestor de Datos</h2> 
            
            <div id="seccionLogin" style="text-align: center; padding: 10px 0;">
                <p style="color: #ccc; margin-bottom: 15px;">Ingrese clave administrativa:</p>
                <div class="form-group">
                    <input type="password" id="adminClave" placeholder="••••••••" style="text-align: center; font-size: 1.2rem;">
                </div>
                <button type="button" class="btn-block" onclick="verificarClaveAdmin()">Ingresar al Panel</button>
            </div>

            <form id="formRegistro" onsubmit="guardarRegistro(event)">
                <div id="camposFormulario" style="display: none;">
                    <div class="form-group">
                        <label id="lblDocumento" for="regDocumento">Documento</label>
                        <input type="text" id="regDocumento" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label id="lblNombre" for="regNombre">Nombre Completo</label>
                        <input type="text" id="regNombre" placeholder="Nombre del socio">
                    </div>
                    <div class="form-group">
                        <label id="lblCategoria" for="regCategoria">Tipo de Plan</label>
                        <select id="regCategoria">
                            <option value="Mes" selected>Mensualidad</option>
                            <option value="Semestral">Semestral</option>
                            <option value="Anual">Anual</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label id="lblFecha" for="regFecha">Fecha de Inicio / Pago</label>
                        <input type="date" id="regFecha" required>
                    </div>
                    <button type="submit" id="btnSubmitAdmin" class="btn-block">Guardar Socio</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 3. MODAL DE REPORTES Y CIERRE DE CAJA (SOLO ADMIN) -->
    <div id="modalReportes" class="modal">
        <div class="modal-contenido ancho-especial">
            <button class="btn-cerrar" onclick="cerrarReportes()">✕</button>
            <h2>📊 Reporte de Caja y Accesos</h2>
            
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
                <div style="flex:1; min-width:130px;">
                    <label style="font-size:0.8rem; color:#aaa;">Desde:</label>
                    <input type="date" id="rep-fecha-inicio" style="width:100%; padding:8px; background:#2c2c2e; border:1px solid #444; color:#fff; border-radius:5px;">
                </div>
                <div style="flex:1; min-width:130px;">
                    <label style="font-size:0.8rem; color:#aaa;">Hasta:</label>
                    <input type="date" id="rep-fecha-fin" style="width:100%; padding:8px; background:#2c2c2e; border:1px solid #444; color:#fff; border-radius:5px;">
                </div>
                <div style="flex:1; min-width:130px;">
                    <label style="font-size:0.8rem; color:#aaa;">Tipo:</label>
                    <select id="rep-tipo" style="width:100%; padding:8px; background:#2c2c2e; border:1px solid #444; color:#fff; border-radius:5px;">
                        <option value="TODOS">Todos</option>
                        <option value="DIA">Días / Pasadías</option>
                        <option value="RENOVACION_MES">Renovaciones</option>
                    </select>
                </div>
                <div style="flex:1; min-width:130px; display:flex; align-items:flex-end;">
                    <button class="btn-block" style="margin:0; padding:9px;" onclick="consultarReportes()">🔍 Filtrar</button>
                </div>
            </div>

            <div id="resumen-totales" style="margin:15px 0; padding:10px; background:rgba(255,255,255,0.05); border-radius:8px; display:flex; justify-content:space-around; font-weight:bold;">
                <!-- Totales calculados por JS -->
            </div>

            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha/Hora</th>
                            <th>Socio</th>
                            <th>Documento</th>
                            <th>Tipo</th>
                            <th>Monto</th>
                            <th>Método</th>
                            <th>Usuario</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-reportes">
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- NOTIFICACIÓN TOAST -->
    <div id="toast" class="toast-container">
        <span id="toastIcono"></span>
        <span id="toastTexto">Mensaje del sistema</span>
    </div>

    <script>
        const URL_API = "https://frankegonzalez.com/api/control-acceso/api.php";

        const DIACCIONARIO_TENANTS = {
            "vidafit": {
                titulo: "Control de Acceso Vida Fit",
                subtitulo: "Por favor, digite su documento de identidad",
                btnAdmin: "⚙️ Gestión Socios",
                modalTitulo: "Panel Administrativo - Vida Fit",
                lblDocumento: "Documento de Identidad (CC)",
                lblNombre: "Nombre Completo del Socio",
                lblCategoria: "Tipo de Plan Asignado",
                lblFecha: "Fecha de Pago / Inscripción",
                btnSubmit: "Guardar / Registrar Socio"
            },
            "default": {
                titulo: "Sistema de Validación Centralizado",
                subtitulo: "Por favor, ingrese el código de verificación",
                btnAdmin: "⚙️ Panel Control",
                modalTitulo: "Gestor de Datos Genérico",
                lblDocumento: "Identificador Único",
                lblNombre: "Nombre / Descripción",
                lblCategoria: "Categoría del Registro",
                lblFecha: "Fecha de Vigencia",
                btnSubmit: "Confirmar Registro"
            }
        };

        const clienteActual = "vidafit"; 
        const ctx = DIACCIONARIO_TENANTS[clienteActual] || DIACCIONARIO_TENANTS["default"];

        document.getElementById("mainTitulo").textContent = ctx.titulo;
        document.getElementById("mainSubtitulo").textContent = ctx.subtitulo;
        document.getElementById("btnAdmin").textContent = ctx.btnAdmin;
        document.getElementById("modalTitulo").textContent = ctx.modalTitulo;
        document.getElementById("lblDocumento").textContent = ctx.lblDocumento;
        document.getElementById("lblNombre").textContent = ctx.lblNombre;
        document.getElementById("lblCategoria").textContent = ctx.lblCategoria;
        document.getElementById("lblFecha").textContent = ctx.lblFecha;
        document.getElementById("btnSubmitAdmin").textContent = ctx.btnSubmit;

        const body = document.body;
        const input = document.getElementById('documentoInput');
        const aviso = document.getElementById('aviso');
        const modalAdmin = document.getElementById('modalAdmin');
        const modalReportes = document.getElementById('modalReportes');

        // Mantenimiento de Autofocus en el input principal
        document.addEventListener('click', (e) => {
            if (!modalAdmin.classList.contains('visible') && !modalReportes.classList.contains('visible') && e.target.id !== 'btnAdmin') {
                input.focus();
            }
        });
        window.addEventListener('load', () => input.focus());

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                procesarAcceso();
            }
        });

        // 🔍 CONSULTAR SOCIO / ACCESO
        async function procesarAcceso() {
            const documento = input.value.trim();
            if (!documento) return;

            input.disabled = true;
            aviso.style.display = "block";
            aviso.style.background = "#4a4e69";
            aviso.innerHTML = "Consultando...";
            ocultarSeccionSocio();

            try {
                const respuesta = await fetch(`${URL_API}?documento=${documento}&cliente=${clienteActual}&_=${new Date().getTime()}`);
                const data = await respuesta.json();

                if (data.status === "success") {
                    if (data.encontrado) {
                        // Cargar variables en campos ocultos para posible edición o cobro
                        document.getElementById('txt-documento-socio').value = data.socio?.documento || documento;
                        document.getElementById('txt-nombre-socio').value = data.socio?.nombre || data.nombre;
                        document.getElementById('txt-id-socio').value = data.socio?.id || '';

                        if (data.resultado === "Autorizado") {
                            mostrarResultado("verde", `ACCESO AUTORIZADO<br><small>${data.motivo}</small>`, data.nombre);
                        } else {
                            mostrarResultado("rojo", `MENSUALIDAD VENCIDA<br><small>${data.motivo}</small>`, data.nombre);
                            mostrarSeccionRenovacion(); // Despliega la opción de cobrar
                        }
                        
                        mostrarContenedorEdicionAdmin();
                    } else {
                        mostrarResultado("rojo", data.motivo, "Usuario No Registrado");
                    }
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                console.error(error);
                mostrarResultado("rojo", "No se pudo conectar con el servidor.", "Error Técnico");
            }
        }

        function mostrarResultado(status, mensaje, nombre) {
            if (status === "verde") {
                body.style.backgroundColor = "var(--bg-verde)";
                aviso.innerHTML = `¡BIENVENIDO!<span class='nombre-usuario'>${nombre}</span><br><small>${mensaje}</small>`;
                setTimeout(resetearPantalla, 3500);
            } else {
                body.style.backgroundColor = "var(--bg-rojo)";
                aviso.innerHTML = `${mensaje}<span class='nombre-usuario'>${nombre}</span>`;
            }
            aviso.style.background = "rgba(0,0,0,0.2)";
        }

        function resetearPantalla() {
            input.disabled = false;
            input.value = "";
            input.focus();
            body.style.backgroundColor = "var(--bg-default)";
            aviso.style.display = "none";
            ocultarSeccionSocio();
        }

        function mostrarSeccionRenovacion() {
            document.getElementById('seccionSocioConsultado').classList.remove('d-none');
            document.getElementById('seccion-renovacion').classList.remove('d-none');
        }

        function mostrarContenedorEdicionAdmin() {
            const usuarioSesion = JSON.parse(localStorage.getItem('usuario_vidafit')) || {};
            if (usuarioSesion.rol === 'ADMIN') {
                document.getElementById('seccionSocioConsultado').classList.remove('d-none');
                document.getElementById('containerEdicionAdmin').classList.remove('d-none');
            }
        }

        function ocultarSeccionSocio() {
            document.getElementById('seccionSocioConsultado').classList.add('d-none');
            document.getElementById('seccion-renovacion').classList.add('d-none');
            document.getElementById('containerEdicionAdmin').classList.add('d-none');
        }

        // 💵 CÁLCULO Y PROCESAMIENTO DE RENOVACIÓN MULTI-MES
        function calcularMontoRenovacion() {
            const PRECIO_MES = 60000;
            const meses = parseInt(document.getElementById('select-meses').value) || 1;
            const total = PRECIO_MES * meses;
            document.getElementById('lbl-monto-total').textContent = total.toLocaleString('es-CO');
        }

        async function procesarRenovacion() {
            const documento = document.getElementById('txt-documento-socio').value || input.value.trim();
            const nombre = document.getElementById('txt-nombre-socio').value;
            const meses = parseInt(document.getElementById('select-meses').value) || 1;
            const metodoPago = document.getElementById('select-metodo').value;
            const PRECIO_MES = 60000;
            const montoTotal = PRECIO_MES * meses;
            const usuarioSesion = JSON.parse(localStorage.getItem('usuario_vidafit')) || { username: 'recepcion' };

            try {
                const res = await fetch(`${URL_API}?action=registrar_pago`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        documento: documento,
                        nombre: nombre,
                        tipo_ingreso: 'RENOVACION_MES',
                        meses: meses,
                        monto: montoTotal,
                        metodo_pago: metodoPago,
                        usuario_registro: usuarioSesion.username
                    })
                });

                const data = await res.json();
                if (data.status === 'success') {
                    mostrarToast('success', `Renovación por ${meses} mes(es) exitosa.`);
                    resetearPantalla();
                } else {
                    mostrarToast('error', data.message || 'Error al procesar renovación.');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarToast('error', 'Error de conexión con el servidor.');
            }
        }

        // ✏️ EDICIÓN DE SOCIOS (ADMIN)
        function habilitarEdicion() {
            document.getElementById('txt-nombre-socio').removeAttribute('readonly');
            document.getElementById('txt-telefono-socio').removeAttribute('readonly');
            document.getElementById('btn-editar-socio').classList.add('d-none');
            document.getElementById('btn-guardar-socio').classList.remove('d-none');
        }

        async function guardarEdicionSocio() {
            const idSocio = document.getElementById('txt-id-socio').value;
            const nombre = document.getElementById('txt-nombre-socio').value;
            const documento = document.getElementById('txt-documento-socio').value;
            const telefono = document.getElementById('txt-telefono-socio').value;
            const usuarioSesion = JSON.parse(localStorage.getItem('usuario_vidafit')) || {};

            try {
                const res = await fetch(`${URL_API}?action=editar_socio`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: idSocio,
                        nombre: nombre,
                        documento: documento,
                        telefono: telefono,
                        rol_usuario: usuarioSesion.rol
                    })
                });

                const data = await res.json();
                if (data.status === 'success') {
                    mostrarToast('success', 'Datos actualizados correctamente');
                    document.getElementById('txt-nombre-socio').setAttribute('readonly', true);
                    document.getElementById('txt-telefono-socio').setAttribute('readonly', true);
                    document.getElementById('btn-editar-socio').classList.remove('d-none');
                    document.getElementById('btn-guardar-socio').classList.add('d-none');
                } else {
                    mostrarToast('error', data.message);
                }
            } catch (error) {
                mostrarToast('error', 'No se pudo guardar la información.');
            }
        }

        // 📊 MODAL Y CONSULTA DE REPORTES
        function abrirReportes() {
            modalReportes.classList.add('visible');
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('rep-fecha-inicio').value = hoy;
            document.getElementById('rep-fecha-fin').value = hoy;
            consultarReportes();
        }

        function cerrarReportes() {
            modalReportes.classList.remove('visible');
            input.focus();
        }

        async function consultarReportes() {
            const fInicio = document.getElementById('rep-fecha-inicio').value;
            const fFin = document.getElementById('rep-fecha-fin').value;
            const tipo = document.getElementById('rep-tipo').value;

            try {
                const res = await fetch(`${URL_API}?action=obtener_reportes&fecha_inicio=${fInicio}&fecha_fin=${fFin}&tipo=${tipo}`);
                const data = await res.json();

                if (data.status === 'success') {
                    const t = data.totales;
                    document.getElementById('resumen-totales').innerHTML = `
                        <div>Total: <span style="color:var(--bg-verde)">$${t.total_recaudado.toLocaleString('es-CO')}</span></div>
                        <div>Efectivo: <span>$${t.efectivo.toLocaleString('es-CO')}</span></div>
                        <div>Digital: <span>$${t.nequi_daviplata.toLocaleString('es-CO')}</span></div>
                    `;

                    const tbody = document.getElementById('tbody-reportes');
                    tbody.innerHTML = '';

                    data.logs.forEach(log => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${log.fecha_hora}</td>
                                <td>${log.nombre}</td>
                                <td>${log.documento}</td>
                                <td><strong style="color:${log.tipo_ingreso === 'DIA' ? 'var(--branding-orange)' : 'var(--bg-verde)'}">${log.tipo_ingreso}</strong></td>
                                <td>$${parseFloat(log.monto).toLocaleString('es-CO')}</td>
                                <td>${log.metodo_pago}</td>
                                <td>${log.usuario_registro}</td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error('Error al cargar reportes:', e);
                mostrarToast('error', 'Error al cargar los datos del reporte');
            }
        }

        // ⚙️ GESTIÓN DE MODAL Y CREDENCIALES ADMIN
        function abrirAdmin() {
            modalAdmin.classList.add('visible');
            document.getElementById('seccionLogin').style.display = 'block';
            document.getElementById('camposFormulario').style.display = 'none';
            setTimeout(() => document.getElementById('adminClave').focus(), 100);
        }

        function cerrarAdmin() {
            modalAdmin.classList.remove('visible');
            document.getElementById('formRegistro').reset();
            input.focus();
        }

        async function verificarClaveAdmin() {
    const claveInput = document.getElementById('adminClave');
    const password = claveInput.value.trim();
    if (!password) return;

    try {
        // Enviar action=login por la URL para activar el case 'login' de PHP
        const respuesta = await fetch(`${URL_API}?action=login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: 'admin', // Usuario por defecto para el panel
                password: password
            })
        });
        
        const data = await respuesta.json();

        if (data.status === "success") {
            // Guardar en el almacenamiento local los datos recibidos del usuario
            localStorage.setItem('usuario_vidafit', JSON.stringify({ 
                id: data.user.id,
                username: data.user.username, 
                nombre: data.user.nombre,
                rol: data.user.rol 
            }));
            
            // Si el usuario validado es ADMIN, desbloquear funciones
            if (data.user.rol === 'ADMIN') {
                document.getElementById('seccionLogin').style.display = 'none';
                document.getElementById('camposFormulario').style.display = 'block';
                document.getElementById('btnReportesNav')?.classList.remove('d-none');
                document.getElementById('regFecha').value = new Date().toISOString().split('T')[0];
                claveInput.value = ""; 
                
                mostrarToast('success', `¡Bienvenido ${data.user.nombre}!`);
            } else {
                mostrarToast('error', 'El usuario no tiene permisos de Administrador.');
            }
        } else {
            mostrarToast('error', data.message || 'Contraseña incorrecta.');
            claveInput.value = "";
        }
    } catch (error) {
        console.error(error);
        mostrarToast('error', 'Error al intentar iniciar sesión.');
    }
}
        async function guardarRegistro(event) {
            event.preventDefault();
            const payload = {
                documento: document.getElementById('regDocumento').value.trim(),
                nombre: document.getElementById('regNombre').value.trim(),
                tipo_plan: document.getElementById('regCategoria').value,
                fecha_pago: document.getElementById('regFecha').value,
                cliente: clienteActual
            };

            try {
                const respuesta = await fetch(URL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await respuesta.json();

                if (data.status === "success") {
                    mostrarToast('success', data.message);
                    cerrarAdmin();
                } else {
                    mostrarToast('error', data.message);
                }
            } catch (error) {
                mostrarToast('error', 'Error de conexión.');
            }
        }

        function mostrarToast(tipo, mensaje) {
            const toast = document.getElementById('toast');
            document.getElementById('toastIcono').textContent = tipo === 'success' ? '✅' : '❌';
            document.getElementById('toastTexto').textContent = mensaje;

            toast.className = `toast-container show ${tipo === 'success' ? 'toast-success' : 'toast-error'}`;
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // CONTROL DE SESIÓN AL CARGAR
        document.addEventListener('DOMContentLoaded', () => {
            const usuarioSesion = JSON.parse(localStorage.getItem('usuario_vidafit'));
            if (usuarioSesion && usuarioSesion.rol === 'ADMIN') {
                document.getElementById('btnReportesNav').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
